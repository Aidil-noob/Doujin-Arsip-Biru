<!DOCTYPE html>
<html>
<head>
  <title>Doujin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="detail" class="box"></div>
<div id="reader"></div>

<script>
const data = JSON.parse(localStorage.getItem("doujinData"));
const id = localStorage.getItem("selectedId");

const item = data.find(d => d.id == id);

document.getElementById("detail").innerHTML = `
  <h2>${item.judul}</h2>
  <p>Author:</p>
  <div id="author"></div>
  <p>Karakter:</p>
  <div id="karakter"></div>
  <p>Genre:</p>
  <div id="genre"></div>
`;

let reader = document.getElementById("reader");

let authorHTML = item.author
  .filter(a => a && a !== "-")
  .map(a => `<span class="author-tag">${a}</span>`)
  .join("");
  
document.getElementById("author").innerHTML = authorHTML;

let karakterHTML = item.karakter
  .filter(k => k && k !== "-")
  .map(k => `<span class="karakter-tag">${k}</span>`)
  .join("");
  
document.getElementById("karakter").innerHTML = karakterHTML;

let genreHTML = item.genre
  .filter(g => g && g !== "-") // buang yang kosong & buang placeholder
  .map(g => `<span class="genre-tag">${g}</span>`) //ubah ke html
  .join(""); //gabungin data

document.getElementById("genre").innerHTML = genreHTML;

item.halaman.forEach(img => {
  reader.innerHTML += `<img src="${img}" style="width:100%">`;
});
</script>

</body>
</html>
